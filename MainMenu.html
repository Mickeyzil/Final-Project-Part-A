<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/style.css">
    <title>Main Menu</title>
</head>

<body>
    <header class="main-header">
        <nav class="nav-container">
            <div class="logo-container">
                <img src="./Images/Logo.png" alt="EV Charge Logo" class="logo-img">
                <span class="logo">EV Charge</span>
            </div>
            <div class="nav-icons">
                <span class="icon">Contact</span>
                <span class="icon">Settings</span>
            </div>
        </nav>
    </header>

    <main class="main-content">

        <section class="welcome-section">
            <div class="welcome-text">
                <h1>Hello, Driver! 👋</h1>
                <p>Ready to charge?</p>
            </div>
        </section>

        <section class="menu-grid">
            <button class="menu-card-row">
                <span class="card-text">Edit Profile</span>
                <span class="card-icon">👤</span>
            </button>

            <button class="menu-card-row">
                <span class="card-text">Favorites</span>
                <span class="card-icon">❤️</span>
            </button>

            <button class="menu-card-row" onclick="location.href='NearbyStations.html'">
                <span class="card-text">Find nearby stations</span>
                <span class="card-icon">📍</span>
            </button>

            <button class="menu-card-row">
                <span class="card-text">Map View</span>
                <span class="card-icon">🗺️</span>
            </button>

            <button class="menu-card-row">
                <span class="card-text">Log Out</span>
                <span class="card-icon">↩️</span>
            </button>
        </section>

    </main>
</body>

<footer class="main-footer">
    <div class="footer-content">  
        <p>© 2026 EV Charge. All rights reserved to Mickey Zilberman and Gil Cohen.</p>
    </div>
</footer>
</html>
